name: CI Pipeline

on:
  pull_request:
    branches: [main] # Только PR в main триггерит CI
  push:
    branches: [main] # Также проверяем прямые коммиты в main

jobs:
  quality-checks:
    name: 🔍 Code Quality & Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🧹 Lint code
        run: npm run lint

      - name: 🔍 Type checking
        run: npm run type

      - name: 🧪 Run unit tests with coverage (min 70%)
        run: npm run test:coverage:unit
        env:
          NODE_ENV: test

      - name: 🔗 Run integration tests with coverage (min 70%)
        run: npm run test:coverage:integration
        env:
          NODE_ENV: test

  build:
    name: 🏗️ Build Check
    runs-on: ubuntu-latest
    needs: quality-checks

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🏗️ Build application
        run: npm run build
        env:
          # AI Services (mock для билда)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'mock-key-for-build' }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY || 'mock-key-for-build' }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY || 'mock-key-for-build' }}

          # Pinecone config
          PINECONE_INDEX_NAME: support-tickets
          PINECONE_NAMESPACE: support-tickets

          # OpenAI models
          OPENAI_EMBEDDING_MODEL: text-embedding-3-small
          OPENAI_EMBEDDING_DIMENSIONS: 1536
          OPENAI_CHAT_MODEL: gpt-4o-mini

          # Database (mock для билда - не используется благодаря lazy init)
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: mock
          POSTGRES_PASSWORD: mock
          POSTGRES_DATABASE: mock

          # Next.js
          NODE_ENV: production

  summary:
    name: ✅ CI Summary
    runs-on: ubuntu-latest
    needs: [quality-checks, build]
    if: always()

    steps:
      - name: 📊 Check results
        run: |
          if [ "${{ needs.quality-checks.result }}" = "success" ] && [ "${{ needs.build.result }}" = "success" ]; then
            echo "🎉 All checks passed!"
            echo "✅ Code quality checks: PASSED"
            echo "✅ Tests with coverage (≥70%): PASSED"
            echo "✅ Build: PASSED"
            echo ""
            echo "🚀 Ready to merge and deploy!"
          else
            echo "❌ Some checks failed:"
            echo "Quality checks: ${{ needs.quality-checks.result }}"
            echo "Build: ${{ needs.build.result }}"
            echo ""
            echo "💡 Common failures:"
            echo "   - Tests failed or coverage < 70%"
            echo "   - Lint errors"
            echo "   - Type errors"
            echo "   - Build errors"
            exit 1
          fi
