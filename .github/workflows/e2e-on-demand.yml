name: E2E Tests (On-Demand)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - production
          - staging
          - custom
        default: "staging"
      custom_url:
        description: 'Custom URL (if environment is "custom")'
        required: false
        type: string
      test_suite:
        description: "Test suite to run"
        required: true
        type: choice
        options:
          - smoke
          - regression
          - full
        default: "full"

jobs:
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Determine Base URL
        id: base-url
        run: |
          if [ "${{ inputs.environment }}" == "production" ]; then
            echo "url=https://ai-customer-support-one-hazel.vercel.app" >> $GITHUB_OUTPUT
          elif [ "${{ inputs.environment }}" == "staging" ]; then
            echo "url=https://ai-customer-support-git-develop-aleksandrs-projects-e3efc3f6.vercel.app" >> $GITHUB_OUTPUT
          elif [ "${{ inputs.environment }}" == "custom" ]; then
            echo "url=${{ inputs.custom_url }}" >> $GITHUB_OUTPUT
          fi

      - name: Run E2E Tests
        env:
          BASE_URL: ${{ steps.base-url.outputs.url }}
          CI: true
        run: |
          if [ "${{ inputs.test_suite }}" == "smoke" ]; then
            npm run test:e2e -- --grep @smoke
          elif [ "${{ inputs.test_suite }}" == "regression" ]; then
            npm run test:e2e -- --grep "@smoke|@regression"
          else
            npm run test:e2e
          fi

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ inputs.environment }}-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

